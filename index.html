<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Íconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="Carrito/carrito.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <title>Sports-Ecommerce</title>
</head>

<body>
  <nav class="navbar">
    <div class="nav-logo">
      <img class="logo-img" src="img/logo-animal.png" alt="Logo de la tienda" />
      <p class="logo-name">Productos</p>
    </div>
    <div class="nav-car">
      <i class="fa-solid fa-cart-shopping"></i>
      <span class="counter-car">0</span>
    </div>
  </nav>
  <section class="galeria-section">
    <div class="galeria">
      <div class="item">
        <img
          src="https://images.unsplash.com/photo-1516442443906-71605254b628?q=80&w=1169&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="Imagen banner camisetas" />
        <div class="description">
          <h3>Camisetas.</h3>
        </div>
      </div>
      <div class="item">
        <img
          src="https://images.unsplash.com/photo-1595341888016-a392ef81b7de?q=80&w=1179&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="Imagen banner tenis" />
        <div class="description">
          <h3>Tenis.</h3>
        </div>
      </div>
      <div class="item">
        <img
          src="https://images.unsplash.com/photo-1645318800862-0d343ebd4e6a?q=80&w=764&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="Imagen banner accesorios" />
        <div class="description">
          <h3>Accesorios.</h3>
        </div>
      </div>
      <div class="item">
        <img
          src="https://images.unsplash.com/photo-1691315909393-c5c91e22760f?q=80&w=686&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="Imagen banner shorts" />
        <div class="description">
          <h3>Shorts.</h3>
        </div>
      </div>
      <div class="item">
        <img
          src="https://plus.unsplash.com/premium_photo-1747861975018-b00d76f3be9b?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="Imagen banner shorts" />
        <div class="description">
          <h3>Conjuntos.</h3>
        </div>
      </div>
    </div>
  </section>

  <div class="bg-dark-subtle text-center" id="filters-section">
    <h5 class="fw-bold titulo-marketing">
      Lo que estás buscando empieza aquí. Explora y compra hoy mismo
    </h5>
    <div class="filters-container bg-dark-subtle"></div>
  </div>
  <div class="main-content">
    <div class="product-container"></div>
    <div class="car">
      <h2>Carrito de Compras</h2>
      <span class="car-items"></span>
      <p class="msg-vacio" style="display: none">🛒 Tu carrito está vacío</p>
      <p class="total-price">Total: <span>$ 0</span></p>
      <button class="btn-vaciar">Vaciar Carrito</button>
    </div>
  </div>
  <script type="module" src="Carrito/carrito.js"></script>
</body>

</html>
