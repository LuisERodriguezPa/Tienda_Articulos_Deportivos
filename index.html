<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Íconos -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Sports-Ecommerce</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-logo">
        <img
          class="logo-img"
          src="img/logo-animal.png"
          alt="Logo de la tienda"
        />
        <p class="logo-name">Productos</p>
      </div>
      <div class="nav-car">
        <a href="carrito.html" class="fa-solid fa-cart-shopping"></a>
        <span class="counter-car">0</span>
      </div>
    </nav>
    <div class="bg-dark-subtle text-center" id="filters-section">
      <h5 class="fw-bold titulo-marketing">
        Lo que estás buscando empieza aquí. Explora y compra hoy mismo
      </h5>
      <div class="filters-container bg-dark-subtle"></div>
    </div>
    <div class="main-content">
      <div class="product-container"></div>
      <div class="car">
        <h2>Carrito de Compras</h2>
        <span class="car-items"></span>
        <p class="msg-vacio" style="display: none">🛒 Tu carrito está vacío</p>
        <p class="total-price">Total: <span>$ 0</span></p>
        <button class="btn-vaciar">Vaciar Carrito</button>
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
